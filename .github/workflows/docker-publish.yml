name: Docker Build & Publish

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: alekseiseleznev/onec-mcp-universal
            context: ./gateway
          - image_name: alekseiseleznev/onec-mcp-universal-bsl-graph-lite
            context: ./bsl-graph-lite
          - image_name: alekseiseleznev/onec-mcp-universal-docker-control
            context: ./docker-control
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "$GITHUB_TOKEN" | docker login "${REGISTRY}" -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail

          image="${REGISTRY}/${{ matrix.image_name }}"
          short_sha="${GITHUB_SHA::7}"

          tag_args=(-t "${image}:sha-${short_sha}")
          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            tag_args+=(-t "${image}:latest")
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            minor="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            tag_args+=(-t "${image}:${version}" -t "${image}:${minor}")
          fi

          docker buildx build \
            "${tag_args[@]}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --push \
            "${{ matrix.context }}"
